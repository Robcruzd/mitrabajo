spring:
  application:
    name: candidate-profile-service
  datasource:
    url: jdbc:postgresql://postgres:5432/tc_candidates_db
    username: tc_postgres_user
    password: tc_postgres_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8083

logging:
  level:
    root: INFO
    com.talentocolombia.candidates.profile: DEBUG
