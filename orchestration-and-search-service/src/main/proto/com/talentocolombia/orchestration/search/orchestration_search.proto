syntax = "proto3";

package com.talentocolombia.orchestration.search;

option java_multiple_files = true;
option java_package = "com.talentocolombia.orchestration.search.grpc";
option java_outer_classname = "OrchestrationSearchProto";

/* ======================
   REQUESTS
   ====================== */

message SearchJobsForCandidateRequest {
  string candidateId = 1;
  int32 page = 2;
  int32 size = 3;
}

message SearchCandidatesForJobRequest {
  string jobId = 1;
  int32 page = 2;
  int32 size = 3;
}

message SearchJobsByKeywordRequest {
  string keyword = 1;
  int32 page = 3;
  int32 size = 4;
}

message SearchJobsByKeywordAndLocationRequest {
  string keyword = 1;
  string location = 2;
  int32 page = 3;
  int32 size = 4;
}

/* ======================
   RESPONSES
   ====================== */

message JobMatchResult {
  string jobId = 1;
  string title = 2;
  string company = 3;
  string location = 4;
  string experienceLevel = 5;
  double score = 6;
  string url = 7;
}

message CandidateMatchResult {
  string candidateId = 1;
  string name = 2;
  double score = 3;
  repeated string matchedSkills = 4;
}

message JobMatchesResponse {
  repeated JobMatchResult jobs = 1;
}

message CandidateMatchesResponse {
  repeated CandidateMatchResult candidates = 1;
}

/* ======================
   SERVICE
   ====================== */

service OrchestrationSearchService {

  rpc FindJobsForCandidate(SearchJobsForCandidateRequest)
      returns (JobMatchesResponse);

  rpc FindJobsByKeyword(SearchJobsByKeywordRequest)
      returns (JobMatchesResponse);

  rpc FindJobsByKeywordAndLocation(SearchJobsByKeywordAndLocationRequest)
      returns (JobMatchesResponse);

  rpc FindCandidatesForJob(SearchCandidatesForJobRequest)
      returns (CandidateMatchesResponse);
}
