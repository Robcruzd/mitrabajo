version: '3.8'

services:
  # Servicio MongoDB para las ofertas de empleo (Job Offers)
  talentocolombia_mongodb:
    image: mongo:latest
    container_name: tc_mongodb_offers
    restart: always
    ports:
      - "27017:27017" # Puerto por defecto de MongoDB
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_ROOT_USERNAME:-talentouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_ROOT_PASSWORD:-talentopass}
    volumes:
      - ./mongodb/data:/data/db # Volumen persistente para los datos
    networks:
      - talentocolombia_net

  # Interfaz web para MongoDB
  talentocolombia_mongo_express:
    image: mongo-express:latest
    container_name: tc_mongo_express
    restart: always
    ports:
      - "8081:8081" # Puerto para acceder a Mongo Express
    environment:
      ME_CONFIG_MONGODB_SERVER: tc_mongodb_offers # Conecta a nuestro servicio MongoDB
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: 'true'
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGODB_ROOT_USERNAME:-talentouser}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGODB_ROOT_PASSWORD:-talentopass}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-pass}
    networks:
      - talentocolombia_net
    depends_on:
      - talentocolombia_mongodb # Asegura que MongoDB inicie primero

  # Servicio PostgreSQL para los perfiles de candidatos (Candidates)
  talentocolombia_postgresql:
    image: postgres:16-alpine # Usamos una imagen ligera de PostgreSQL 16
    container_name: tc_postgresql_candidates
    restart: always
    ports:
      - "5432:5432" # Puerto por defecto de PostgreSQL
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tc_candidates_db} # Nombre de la base de datos
      POSTGRES_USER: ${POSTGRES_USER:-tc_postgres_user} # Usuario de la base de datos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tc_postgres_pass} # Contraseña del usuario
    volumes:
      - ./postgresql/data:/var/lib/postgresql/data # Volumen persistente para los datos
    networks:
      - talentocolombia_net

  # Interfaz web para PostgreSQL
  talentocolombia_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tc_pgadmin
    restart: always
    ports:
      - "8080:80" # Puerto para acceder a pgAdmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@talentocolombia.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_pass}
      PGADMIN_LISTEN_PORT: 80
    volumes:
      - pgadmin_data:/var/lib/pgadmin # Volumen para la configuración y sesiones de pgAdmin
    networks:
      - talentocolombia_net
    depends_on:
      - talentocolombia_postgresql # Asegura que PostgreSQL inicie primero

# Volúmenes para persistir datos (fuera de los contenedores)
volumes:
  pgadmin_data: # Volumen específico para los datos de pgAdmin

# Red común para que todos los servicios se comuniquen entre sí
networks:
  talentocolombia_net:
    driver: bridge